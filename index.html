<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificando acesso...</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:
        radial-gradient(circle at top, #2a0010 0%, #120008 35%, #05010a 100%);
      font-family:Arial,Helvetica,sans-serif;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
      position:relative;
    }

    .bg-fire{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .fire{
      position:absolute;
      top:-40px;
      font-size:12px;
      opacity:.14;
      filter:blur(.2px);
      animation-name:fall;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    @keyframes fall{
      0%{
        transform:translateY(-40px) translateX(0) rotate(0deg);
        opacity:0;
      }
      10%{
        opacity:.14;
      }
      50%{
        transform:translateY(50vh) translateX(12px) rotate(90deg);
        opacity:.18;
      }
      100%{
        transform:translateY(110vh) translateX(-10px) rotate(180deg);
        opacity:0;
      }
    }

    .box{
      width:90%;
      max-width:420px;
      text-align:center;
      position:relative;
      z-index:2;
      padding:28px 22px;
      border-radius:24px;
      background:rgba(10, 0, 8, 0.45);
      border:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(4px);
      box-shadow:
        0 0 50px rgba(255, 60, 20, 0.10),
        0 0 120px rgba(255, 0, 60, 0.08);
    }

    .line{
      opacity:0;
      transform:translateY(18px) scale(.96);
      filter:blur(8px);
      animation:reveal .7s cubic-bezier(.22,1,.36,1) forwards;
    }

    .line:nth-child(1){ animation-delay:.20s; }
    .line:nth-child(2){ animation-delay:.55s; }
    .line:nth-child(3){ animation-delay:.90s; }
    .line:nth-child(4){ animation-delay:1.25s; }
    .line:nth-child(5){ animation-delay:1.60s; }
    .line:nth-child(6){ animation-delay:1.95s; }

    @keyframes reveal{
      0%{
        opacity:0;
        transform:translateY(18px) scale(.96);
        filter:blur(8px);
      }
      60%{
        opacity:1;
      }
      100%{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
      }
    }

    p{
      font-size:20px;
      line-height:1.35;
      margin:12px 0;
      text-shadow:0 0 14px rgba(255,255,255,.06);
    }

    .highlight{
      color:#ff6a3d;
      font-weight:700;
      text-shadow:
        0 0 10px rgba(255,106,61,.35),
        0 0 22px rgba(255,60,20,.22);
    }

    .btn{
      display:none;
      margin-top:26px;
      padding:18px 20px;
      background:linear-gradient(90deg,#ff174f,#ff5e00 55%,#ff8a00 100%);
      border-radius:999px;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      font-size:16px;
      letter-spacing:.4px;
      box-shadow:
        0 0 18px rgba(255, 70, 20, 0.45),
        0 0 36px rgba(255, 30, 80, 0.28);
      animation:pulse 1.15s infinite;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:70%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
      transform:skewX(-20deg);
      animation:shine 2.2s infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.045);
      }
      100%{
        transform:scale(1);
      }
    }

    @keyframes shine{
      0%{
        left:-120%;
      }
      100%{
        left:140%;
      }
    }

    .small{
      font-size:12px;
      opacity:.75;
      margin-top:12px;
      display:none;
      color:#ffd8c8;
    }

    @media (max-width:480px){
      p{
        font-size:18px;
      }

      .btn{
        font-size:15px;
        padding:17px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-fire" aria-hidden="true">
    <span class="fire" style="left:4%; animation-duration:8s; animation-delay:.2s;">🔥</span>
    <span class="fire" style="left:11%; animation-duration:10s; animation-delay:1.4s;">🔥</span>
    <span class="fire" style="left:18%; animation-duration:7.5s; animation-delay:2.2s;">🔥</span>
    <span class="fire" style="left:26%; animation-duration:9s; animation-delay:.8s;">🔥</span>
    <span class="fire" style="left:33%; animation-duration:11s; animation-delay:1.8s;">🔥</span>
    <span class="fire" style="left:41%; animation-duration:8.8s; animation-delay:3.1s;">🔥</span>
    <span class="fire" style="left:49%; animation-duration:7.8s; animation-delay:1.1s;">🔥</span>
    <span class="fire" style="left:57%; animation-duration:10.2s; animation-delay:2.7s;">🔥</span>
    <span class="fire" style="left:64%; animation-duration:8.4s; animation-delay:.5s;">🔥</span>
    <span class="fire" style="left:72%; animation-duration:9.6s; animation-delay:2.1s;">🔥</span>
    <span class="fire" style="left:80%; animation-duration:7.3s; animation-delay:1.6s;">🔥</span>
    <span class="fire" style="left:88%; animation-duration:10.8s; animation-delay:3.4s;">🔥</span>
    <span class="fire" style="left:95%; animation-duration:8.6s; animation-delay:.9s;">🔥</span>
  </div>

  <div class="box">
    <p class="line">Algo foi liberado pra você...</p>

<p class="line highlight">Isso não fica aberto por muito tempo</p>

<p class="line">Se você sair agora… pode não conseguir voltar</p>

    <a id="btn" class="btn" href="https://t.me/projetovenusvip_bot?start=bruxo">
      ENTRAR AGORA ANTES QUE SUMA
    </a>

    <div class="small" id="msg">
      Já teve gente que perdeu o acesso tentando entrar depois
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById("btn").style.display = "block";
      document.getElementById("msg").style.display = "block";
    }, 2400);
  </script>
</body>
</html>
